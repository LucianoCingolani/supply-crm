{% extends "base.html" %}

{% block title %}Dashboard - Supply Argentina{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
    <p class="text-gray-500 mt-1">Bienvenido, {{ user.get_full_name|default:user.email }}</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <p class="text-sm font-medium text-gray-500">Total Clientes</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">0</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <p class="text-sm font-medium text-gray-500">Oportunidades activas</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">0</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <p class="text-sm font-medium text-gray-500">Tareas pendientes</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">0</p>
    </div>
</div>
{% endblock %}
