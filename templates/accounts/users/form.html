{% extends "base.html" %}

{% block title %}{{ title }} - Supply Argentina{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'accounts:user_list' %}" class="text-gray-400 hover:text-gray-600">
            ← Volver
        </a>
        <h1 class="text-2xl font-bold text-gray-900">{{ title }}</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                <p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="pt-2 flex gap-3">
                <button type="submit"
                    class="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                    Guardar
                </button>
                <a href="{% url 'accounts:user_list' %}"
                    class="px-5 py-2 bg-white text-gray-600 text-sm font-medium rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
